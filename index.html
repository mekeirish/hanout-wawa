<!DOCTYPE html>
<html lang="fr" data-theme="forest">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Hanout - Catalogue</title>
  <!-- Tailwind + DaisyUI -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" />
  <!-- React + ReactDOM (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* Ajustements légers pour le thème forest */
    .card-compact .card-body {
      padding: 1rem;
    }
    .btn-sm {
      min-height: 2rem;
      height: 2rem;
      padding-left: 0.75rem;
      padding-right: 0.75rem;
      font-size: 0.875rem;
    }
    .modal-box {
      max-width: 95vw;
    }
    @media (min-width: 640px) {
      .modal-box {
        max-width: 28rem;
      }
    }
    /* Cache le scrollbar sur mobile pour un meilleur rendu */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a2e1a">
  <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect } = React;

  function App() {

    // ---- CONSTANTES INJECTÉES PAR LE FORKEUR ----
    const VENDOR = "wawa";
    const PASSWORD_HASH = "96cae35ce8a9b0244178bf28e4966c2ce1b8385723a96a6b838858cdd6ca0a1e";
    const isPlaceholder = VENDOR.startsWith("{{");

    // ---- DÉDUCTION AUTOMATIQUE ----
    const params = new URLSearchParams(window.location.search);
    const repoName = window.location.pathname.split('/')[1] || '';
    const deducedVendor = repoName.startsWith('hanout-') ? repoName.replace('hanout-', '') : null;
    const vendeur = params.get("vendeur") || deducedVendor || localStorage.getItem("vendeur_name") || VENDOR;

    // ---- TOKEN (demandé uniquement au commit) ----
    let MASTER_TOKEN = null;
    function getToken() {
      if (MASTER_TOKEN) return MASTER_TOKEN;
      const tokenKey = `fgt_token_${repoName}`;
      let token = localStorage.getItem(tokenKey);
      if (!token) {
        token = prompt(`🔐 Entrez le token pour ${repoName} :`);
        if (token) localStorage.setItem(tokenKey, token);
        else {
          alert("Token requis pour cette action.");
          return null;
        }
      }
      MASTER_TOKEN = token;
      return token;
    }

    // ---- ÉTATS ----
    const [isLoading, setIsLoading] = useState(true);
    const [data, setData] = useState(null);
    const [editableData, setEditableData] = useState(null);
    const [isAdmin, setIsAdmin] = useState(false);
    const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
    const [showPasswordModal, setShowPasswordModal] = useState(false);
    const [adminPassword, setAdminPassword] = useState("");
    const [msg, setMsg] = useState({ text: "", type: "" });
    const [isCommitting, setIsCommitting] = useState(false);
    const [modal, setModal] = useState({ open: false, type: "", item: null, creating: false });
    const [formData, setFormData] = useState({});
    const [cart, setCart] = useState([]);
    const [showCart, setShowCart] = useState(false);
    const [expandedImage, setExpandedImage] = useState(null);
    const [selectedCategoryId, setSelectedCategoryId] = useState(null);
    const [searchQuery, setSearchQuery] = useState("");
    const [order, setOrder] = useState({ name: "", address: "", phone: "", comments: "" });

    // ---- SCHÉMA ----
    const schema = {
      categories: {
        label: "Catégories",
        icon: "📂",
        fields: [
          { key: "icon", label: "Icône", type: "text", maxLength: 2, default: "📁" },
          { key: "name", label: "Nom", type: "text", required: true },
        ]
      },
      products: {
        label: "Produits",
        icon: "📦",
        fields: [
          { key: "name", label: "Nom", type: "text", required: true },
          { key: "price", label: "Prix", type: "number", step: "0.01", required: true },
          { key: "image", label: "URL image", type: "text" },
          { key: "categoryId", label: "Catégorie", type: "select", options: "categories" },
          { key: "stock", label: "Stock", type: "number" },
        ]
      }
    };

    // ---- CHARGEMENT (sans token) ----
    useEffect(() => {
      const load = async () => {
        if (!vendeur || isPlaceholder) { setIsLoading(false); return; }
        try {
          const url = `https://api.github.com/repos/mekeirish/${repoName}/contents/don.json`;
          const res = await fetch(url);
          if (res.status === 404) {
            const defaultData = {
              settings: { title: `Boutique de ${vendeur}`, currency: "DZD", showStock: true, ntfyTopic: `${vendeur}_commandes` },
              categories: [],
              products: [],
            };
            setData(defaultData);
            setEditableData(defaultData);
          } else if (res.ok) {
            const d = await res.json();
            setData(JSON.parse(atob(d.content)));
            setEditableData(JSON.parse(atob(d.content)));
          }
        } catch (err) {
          setMsg({ text: `❌ Erreur: ${err.message}`, type: "error" });
        }
        setIsLoading(false);
      };
      load();
    }, []);

    // ---- SAUVEGARDE (avec token) ----
    const saveFile = async (content) => {
      const token = getToken();
      if (!token) throw new Error("Token requis.");
      const url = `https://api.github.com/repos/mekeirish/${repoName}/contents/don.json`;
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
      let sha = null;
      try {
        const getRes = await fetch(url, { headers: { Authorization: `token ${token}` } });
        if (getRes.ok) { const d = await getRes.json(); sha = d.sha; }
      } catch (e) {}
      const payload = { message: "Mise à jour", content: encoded, branch: "main" };
      if (sha) payload.sha = sha;
      const putRes = await fetch(url, {
        method: "PUT",
        headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!putRes.ok) { const err = await putRes.json(); throw new Error(`GitHub ${putRes.status}: ${err.message}`); }
      return putRes.json();
    };

    const saveEditableData = async () => {
      await saveFile(editableData);
      setData(editableData);
    };

    // ---- AUTH ADMIN ----
    const sha256 = async (message) => {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    };

    const handleAdminLogin = async () => {
      const hash = await sha256(adminPassword);
      if (hash === PASSWORD_HASH) {
        setIsAdminAuthenticated(true);
        setShowPasswordModal(false);
        setAdminPassword("");
        setMsg({ text: "✅ Accès admin autorisé", type: "success" });
        setIsAdmin(true);
      } else {
        setMsg({ text: "❌ Mot de passe incorrect", type: "error" });
      }
    };

    const handleAdminClick = () => {
      if (isAdminAuthenticated) {
        setIsAdmin(!isAdmin);
      } else {
        setShowPasswordModal(true);
      }
    };

    // ---- CRUD CATÉGORIES ----
    const openCatModal = (cat = null) => {
      setModal({ open: true, type: "category", item: cat, creating: !cat });
      const defaultVals = {};
      schema.categories.fields.forEach(f => defaultVals[f.key] = cat?.[f.key] || f.default || "");
      setFormData(defaultVals);
    };

    const saveCategory = () => {
      const newCat = {
        id: modal.creating ? Math.max(...editableData.categories.map(c => c.id), 0) + 1 : modal.item.id
      };
      schema.categories.fields.forEach(f => newCat[f.key] = formData[f.key] || f.default);
      if (modal.creating) editableData.categories.push(newCat);
      else {
        const idx = editableData.categories.findIndex(c => c.id === modal.item.id);
        if (idx > -1) editableData.categories[idx] = newCat;
      }
      setEditableData({ ...editableData });
      closeModal();
      setMsg({ text: "Catégorie sauvegardée", type: "info" });
    };

    const deleteCategory = (id) => {
      if (!confirm("Supprimer cette catégorie ?")) return;
      setEditableData({
        ...editableData,
        categories: editableData.categories.filter(c => c.id !== id),
        products: editableData.products.filter(p => p.categoryId !== id),
      });
      setMsg({ text: "Catégorie supprimée", type: "info" });
    };

    // ---- CRUD PRODUITS ----
    const openProdModal = (prod = null) => {
      setModal({ open: true, type: "product", item: prod, creating: !prod });
      const defaultVals = {};
      schema.products.fields.forEach(f => {
        if (f.key === "categoryId") {
          const defaultCategory = selectedCategoryId || editableData.categories[0]?.id || "";
          defaultVals[f.key] = prod?.[f.key] || defaultCategory || f.default || "";
        } else {
          defaultVals[f.key] = prod?.[f.key] || f.default || "";
        }
      });
      setFormData(defaultVals);
    };

    const saveProduct = () => {
      if (!formData.categoryId && editableData.categories.length > 0) {
        formData.categoryId = editableData.categories[0].id;
      }
      const newProd = {
        id: modal.creating ? Math.max(...editableData.products.map(p => p.id), 0) + 1 : modal.item.id
      };
      schema.products.fields.forEach(f => {
        const val = formData[f.key] !== undefined ? formData[f.key] : f.default;
        newProd[f.key] = f.type === "number" ? parseFloat(val) || 0 : val;
      });
      if (modal.creating) editableData.products.push(newProd);
      else {
        const idx = editableData.products.findIndex(p => p.id === modal.item.id);
        if (idx > -1) editableData.products[idx] = newProd;
      }
      setEditableData({ ...editableData });
      closeModal();
      setMsg({ text: "Produit sauvegardé", type: "info" });
    };

    const deleteProduct = (id) => {
      if (!confirm("Supprimer ce produit ?")) return;
      setEditableData({ ...editableData, products: editableData.products.filter(p => p.id !== id) });
      setMsg({ text: "Produit supprimé", type: "info" });
    };

    // ---- COMMIT ----
    const handleCommit = async () => {
      setIsCommitting(true);
      try {
        await saveEditableData();
        setMsg({ text: "✅ Données sauvegardées sur GitHub", type: "success" });
      } catch (err) {
        setMsg({ text: `❌ Échec : ${err.message}`, type: "error" });
      }
      setIsCommitting(false);
    };

    // ---- PANIER ----
    const addToCart = (product) => {
      if (product.stock <= 0) { alert("Rupture de stock"); return; }
      setCart(prev => {
        const existing = prev.find(i => i.id === product.id);
        if (existing) {
          if (existing.quantity >= product.stock) { alert("Stock insuffisant"); return prev; }
          return prev.map(i => i.id === product.id ? { ...i, quantity: i.quantity + 1 } : i);
        }
        return [...prev, { ...product, quantity: 1 }];
      });
    };

    const updateQty = (id, delta) => {
      setCart(prev => {
        const item = prev.find(i => i.id === id);
        if (!item) return prev;
        const newQty = item.quantity + delta;
        if (newQty <= 0) return prev.filter(i => i.id !== id);
        if (newQty > item.stock) { alert("Stock insuffisant"); return prev; }
        return prev.map(i => i.id === id ? { ...i, quantity: newQty } : i);
      });
    };

    const removeFromCart = (id) => setCart(prev => prev.filter(i => i.id !== id));
    const getTotal = () => cart.reduce((sum, i) => sum + i.price * i.quantity, 0).toFixed(2);

    const checkout = async () => {
      if (cart.length === 0) { alert("Panier vide"); return; }
      if (!order.name.trim() || !order.address.trim() || !order.phone.trim()) {
        alert("Veuillez remplir tous les champs obligatoires");
        return;
      }
      const topic = editableData?.settings?.ntfyTopic;
      if (topic) {
        const summary = cart.map(i => `${i.name} x${i.quantity} = ${(i.price * i.quantity).toFixed(2)}${editableData?.settings?.currency || "€"}`).join("\n");
        const msg = `📋 COMMANDE\n👤 ${order.name}\n📍 ${order.address}\n📞 ${order.phone}\n💬 ${order.comments || "Aucun"}\n🛒 ${summary}\n💰 TOTAL: ${getTotal()}${editableData?.settings?.currency || "€"}`;
        await fetch(`https://ntfy.sh/${topic}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic, title: "🛍️ NOUVELLE COMMANDE", message: msg, priority: 5 }),
        }).catch(console.error);
      }
      setCart([]);
      setOrder({ name: "", address: "", phone: "", comments: "" });
      setShowCart(false);
      alert("✅ Commande validée !");
    };

    // ---- UTILITAIRES ----
    const getCategoryName = (id) => data?.categories?.find(c => c.id === id)?.name || "Sans catégorie";
    const getCategoryIcon = (id) => data?.categories?.find(c => c.id === id)?.icon || "📁";

    const hasPending = (item, type) => {
      if (!data) return false;
      const orig = type === "product" ? data.products.find(p => p.id === item.id) : data.categories.find(c => c.id === item.id);
      const draft = type === "product" ? editableData.products.find(p => p.id === item.id) : editableData.categories.find(c => c.id === item.id);
      return JSON.stringify(orig) !== JSON.stringify(draft);
    };

    const getFiltered = () => {
      if (!editableData) return [];
      let filtered = editableData.products || [];
      if (selectedCategoryId) filtered = filtered.filter(p => p.categoryId === selectedCategoryId);
      if (searchQuery.trim()) {
        const q = searchQuery.toLowerCase().trim();
        filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || p.price.toString().includes(q));
      }
      return filtered;
    };

    const closeModal = () => setModal({ open: false, type: "", item: null, creating: false });

    const renderField = (field) => {
      const val = formData[field.key] || "";
      const onChange = (e) => setFormData({ ...formData, [field.key]: e.target.value });

      if (field.type === "select") {
        const options = field.options === "categories" ? (editableData?.categories || []) : [];
        return (
          <select key={field.key} value={val} onChange={onChange} className="select select-bordered w-full">
            <option value="">Choisir...</option>
            {options.map(opt => <option key={opt.id} value={opt.id}>{opt.icon} {opt.name}</option>)}
          </select>
        );
      }
      if (field.type === "textarea") {
        return <textarea key={field.key} value={val} onChange={onChange} placeholder={field.label} rows={field.rows || 2} className="textarea textarea-bordered w-full" />;
      }
      return (
        <input key={field.key} type={field.type || "text"} step={field.step} maxLength={field.maxLength} value={val} onChange={onChange} placeholder={field.label} className="input input-bordered w-full" />
      );
    };

    // ---- CHARGEMENT ----
    if (isLoading) {
      return (
        <div className="min-h-screen flex items-center justify-center">
          <span className="loading loading-spinner loading-lg text-primary"></span>
        </div>
      );
    }

    if (!vendeur || isPlaceholder) {
      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="card bg-base-200 shadow-xl max-w-md w-full">
            <div className="card-body text-center">
              <h2 className="card-title text-error justify-center">⚙️ Configuration requise</h2>
              <p>{isPlaceholder ? "Le template n'a pas été configuré." : "Le vendeur n'a pas été configuré correctement."}</p>
              <p className="text-sm opacity-70">Utilisez le forkeur pour créer une boutique.</p>
            </div>
          </div>
        </div>
      );
    }

    const settings = editableData?.settings || {};
    const currency = settings.currency || "€";

    return (
      <div className="min-h-screen bg-base-200">

        {/* Header avec boutons admin et panier */}
        <div className="navbar bg-base-300 shadow-md sticky top-0 z-30">
          <div className="flex-1">
            <h1 className="text-xl font-bold text-primary">{settings.title || "⚡ Catalogue"}</h1>
          </div>
          <div className="flex gap-2">
            <button onClick={handleAdminClick} className="btn btn-ghost btn-sm">
              🔑
            </button>
            <button onClick={() => setShowCart(!showCart)} className="btn btn-ghost btn-sm relative">
              🛒
              {cart.length > 0 && (
                <span className="badge badge-secondary badge-sm absolute -top-2 -right-2">
                  {cart.reduce((s, i) => s + i.quantity, 0)}
                </span>
              )}
            </button>
          </div>
        </div>

        {/* Contenu principal */}
        <div className="container mx-auto px-4 pb-32 pt-4">

          {isAdmin && isAdminAuthenticated ? (
            // ---- ADMIN ----
            <div className="space-y-6">
              <h2 className="text-2xl font-bold text-primary">🛠️ PANEL ADMIN</h2>

              {/* Settings */}
              <div className="card bg-base-100 shadow-md">
                <div className="card-body">
                  <h3 className="font-semibold">⚙️ Configuration</h3>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <input type="text" value={editableData?.settings?.title || ""} onChange={e => setEditableData({ ...editableData, settings: { ...editableData.settings, title: e.target.value } })} placeholder="Titre" className="input input-bordered input-sm w-full" />
                    <input type="text" value={editableData?.settings?.currency || ""} onChange={e => setEditableData({ ...editableData, settings: { ...editableData.settings, currency: e.target.value } })} placeholder="Devise" className="input input-bordered input-sm w-full" />
                    <input type="text" value={editableData?.settings?.ntfyTopic || ""} onChange={e => setEditableData({ ...editableData, settings: { ...editableData.settings, ntfyTopic: e.target.value } })} placeholder="Topic ntfy" className="input input-bordered input-sm w-full" />
                  </div>
                </div>
              </div>

              {/* Catégories */}
              <div className="card bg-base-100 shadow-md">
                <div className="card-body">
                  <div className="flex justify-between items-center mb-3">
                    <h3 className="font-semibold">{schema.categories.icon} {schema.categories.label}</h3>
                    <button onClick={() => openCatModal(null)} className="btn btn-success btn-sm">＋ Ajouter</button>
                  </div>
                  <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                    {(editableData?.categories || []).map(c => (
                      <div key={c.id} className={`flex items-center gap-2 p-2 rounded-lg border ${hasPending(c, "category") ? 'border-warning bg-warning/10' : 'border-base-300'}`}>
                        <span className="text-xl">{c.icon}</span>
                        <span className="flex-1 text-sm truncate">{c.name}</span>
                        <button onClick={() => openCatModal(c)} className="btn btn-ghost btn-xs">✎</button>
                        <button onClick={() => deleteCategory(c.id)} className="btn btn-ghost btn-xs text-error">✕</button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Produits */}
              <div className="card bg-base-100 shadow-md">
                <div className="card-body">
                  <div className="flex justify-between items-center mb-3">
                    <h3 className="font-semibold">{schema.products.icon} {schema.products.label}</h3>
                    <button onClick={() => openProdModal(null)} className="btn btn-success btn-sm">＋ Ajouter</button>
                  </div>
                  <div className="space-y-2">
                    {(editableData?.products || []).map(p => (
                      <div key={p.id} className={`flex items-center gap-3 p-2 rounded-lg border ${hasPending(p, "product") ? 'border-warning bg-warning/10' : 'border-base-300'}`}>
                        <img src={p.image} alt={p.name} className="w-10 h-10 object-cover rounded-full" onError={e => e.target.src = "https://via.placeholder.com/50"} />
                        <div className="flex-1">
                          <p className="text-sm font-medium">{p.name}</p>
                          <p className="text-xs opacity-70">{p.price}{currency} · {getCategoryName(p.categoryId)} · stock:{p.stock}</p>
                        </div>
                        <button onClick={() => openProdModal(p)} className="btn btn-ghost btn-xs">✎</button>
                        <button onClick={() => deleteProduct(p.id)} className="btn btn-ghost btn-xs text-error">✕</button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Commit */}
              <div className="card bg-base-100 shadow-md">
                <div className="card-body">
                  <button onClick={handleCommit} disabled={isCommitting} className={`btn btn-primary w-full ${isCommitting ? 'loading' : ''}`}>
                    {isCommitting ? '⏳ Sauvegarde...' : '💾 Sauvegarder (Commit)'}
                  </button>
                  {msg.text && <p className={`text-sm mt-2 ${msg.type === 'success' ? 'text-success' : msg.type === 'error' ? 'text-error' : 'text-warning'}`}>{msg.text}</p>}
                </div>
              </div>
            </div>
          ) : (
            // ---- CATALOGUE ----
            <>
              {/* Recherche */}
              <div className="mb-4">
                <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="🔍 Rechercher..." className="input input-bordered w-full" />
              </div>

              {/* Catégories (filtres) */}
              <div className="flex flex-wrap gap-2 mb-4 overflow-x-auto pb-2 no-scrollbar">
                <button onClick={() => setSelectedCategoryId(null)} className={`btn btn-sm ${!selectedCategoryId ? 'btn-primary' : 'btn-ghost'}`}>🏠 Tous</button>
                {(editableData?.categories || []).map(c => (
                  <button key={c.id} onClick={() => setSelectedCategoryId(c.id)} className={`btn btn-sm ${selectedCategoryId === c.id ? 'btn-primary' : 'btn-ghost'}`}>
                    {c.icon} {c.name}
                  </button>
                ))}
              </div>

              {/* Grille produits */}
              <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
                {getFiltered().map(p => (
                  <div key={p.id} className="card bg-base-100 shadow-md hover:shadow-lg transition-shadow">
                    <figure className="px-2 pt-2">
                      <img src={p.image} alt={p.name} onClick={() => setExpandedImage(p.image)} className="w-full h-32 object-cover rounded-xl cursor-pointer" onError={e => e.target.src = "https://via.placeholder.com/200"} />
                    </figure>
                    <div className="card-body p-3">
                      <span className="text-xs opacity-70">{getCategoryIcon(p.categoryId)} {getCategoryName(p.categoryId)}</span>
                      <h3 className="text-sm font-semibold truncate">{p.name}</h3>
                      <p className="text-base font-bold text-primary">{p.price}{currency}</p>
                      {settings.showStock && <p className="text-xs opacity-70">Stock: {p.stock > 0 ? p.stock : '⚠️ Rupture'}</p>}
                      <button onClick={() => addToCart(p)} disabled={p.stock <= 0} className={`btn btn-primary btn-sm w-full ${p.stock <= 0 ? 'btn-disabled' : ''}`}>
                        🛒 Ajouter
                      </button>
                    </div>
                  </div>
                ))}
              </div>

              {getFiltered().length === 0 && (
                <div className="text-center py-10 opacity-70">
                  {searchQuery ? "Aucun produit ne correspond." : "Aucun produit dans cette catégorie."}
                </div>
              )}

              {/* Footer */}
              <div className="mt-8 text-center text-xs opacity-50 border-t border-base-300 pt-4">
                {(data?.products || []).length} PRODUITS · {(data?.categories || []).length} CATÉGORIES
                {settings.ntfyTopic && <span className="ml-4">🔔 {settings.ntfyTopic}</span>}
              </div>
            </>
          )}
        </div>

        {/* ---- MODALS ---- */}
        {/* Modal mot de passe */}
        {showPasswordModal && (
          <div className="modal modal-open" onClick={() => setShowPasswordModal(false)}>
            <div className="modal-box" onClick={e => e.stopPropagation()}>
              <h3 className="font-bold text-lg">🔐 Accès admin</h3>
              <p className="text-sm opacity-70 mb-4">Entrez votre mot de passe.</p>
              <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} placeholder="Mot de passe" className="input input-bordered w-full" onKeyDown={e => e.key === "Enter" && handleAdminLogin()} />
              <div className="modal-action">
                <button onClick={handleAdminLogin} className="btn btn-primary">✅ Valider</button>
                <button onClick={() => setShowPasswordModal(false)} className="btn btn-ghost">Annuler</button>
              </div>
              {msg.text && msg.type === "error" && <p className="text-error text-sm mt-2">{msg.text}</p>}
            </div>
          </div>
        )}

        {/* Modal image agrandie */}
        {expandedImage && (
          <div className="modal modal-open" onClick={() => setExpandedImage(null)}>
            <div className="modal-box max-w-3xl p-0 bg-transparent shadow-none" onClick={e => e.stopPropagation()}>
              <img src={expandedImage} alt="Agrandissement" className="w-full rounded-xl" onError={e => e.target.src = "https://via.placeholder.com/800"} />
              <button onClick={() => setExpandedImage(null)} className="btn btn-ghost btn-sm absolute top-2 right-2 text-white">✕</button>
            </div>
          </div>
        )}

        {/* Modal Panier */}
        {showCart && (
          <div className="modal modal-open" onClick={() => setShowCart(false)}>
            <div className="modal-box max-w-md" onClick={e => e.stopPropagation()}>
              <h3 className="font-bold text-lg">🛒 Mon Panier</h3>
              {cart.length === 0 ? (
                <p className="py-4 text-center opacity-70">Panier vide</p>
              ) : (
                <>
                  <div className="space-y-2 max-h-60 overflow-y-auto my-4">
                    {cart.map(i => (
                      <div key={i.id} className="flex items-center gap-3 bg-base-200 p-2 rounded-lg">
                        <img src={i.image} alt={i.name} className="w-12 h-12 object-cover rounded-full" onError={e => e.target.src = "https://via.placeholder.com/50"} />
                        <div className="flex-1">
                          <p className="text-sm font-medium">{i.name}</p>
                          <p className="text-xs opacity-70">{i.price}{currency}</p>
                        </div>
                        <div className="flex items-center gap-1">
                          <button onClick={() => updateQty(i.id, -1)} className="btn btn-ghost btn-xs">-</button>
                          <span className="w-6 text-center">{i.quantity}</span>
                          <button onClick={() => updateQty(i.id, 1)} className="btn btn-ghost btn-xs">+</button>
                          <button onClick={() => removeFromCart(i.id)} className="btn btn-ghost btn-xs text-error">✕</button>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className="flex justify-between font-bold border-t border-base-300 pt-2">
                    <span>Total</span>
                    <span className="text-primary">{getTotal()}{currency}</span>
                  </div>

                  {/* Champs commande */}
                  <div className="space-y-2 mt-4">
                    <input type="text" value={order.name} onChange={e => setOrder({ ...order, name: e.target.value })} placeholder="Nom complet *" className="input input-bordered input-sm w-full" />
                    <input type="text" value={order.address} onChange={e => setOrder({ ...order, address: e.target.value })} placeholder="Adresse *" className="input input-bordered input-sm w-full" />
                    <input type="tel" value={order.phone} onChange={e => setOrder({ ...order, phone: e.target.value })} placeholder="Téléphone *" className="input input-bordered input-sm w-full" />
                    <textarea value={order.comments} onChange={e => setOrder({ ...order, comments: e.target.value })} placeholder="Commentaires (facultatif)" rows="2" className="textarea textarea-bordered w-full textarea-sm"></textarea>
                  </div>

                  <div className="modal-action">
                    <button onClick={checkout} className="btn btn-primary w-full">✅ Valider la commande</button>
                  </div>
                </>
              )}
            </div>
          </div>
        )}

        {/* Modal générique (création/édition) */}
        {modal.open && (
          <div className="modal modal-open" onClick={closeModal}>
            <div className="modal-box" onClick={e => e.stopPropagation()}>
              <h3 className="font-bold text-lg">
                {modal.creating ? `✦ Nouveau ${modal.type === "category" ? "catégorie" : "produit"}` : `✦ Modifier ${modal.type === "category" ? "la catégorie" : "le produit"}`}
              </h3>
              <div className="space-y-3 mt-4">
                {modal.type === "category"
                  ? schema.categories.fields.map(renderField)
                  : schema.products.fields.map(f => {
                      if (f.key === "categoryId") return renderField({ ...f, options: "categories" });
                      return renderField(f);
                    })
                }
              </div>
              <div className="modal-action">
                <button onClick={modal.type === "category" ? saveCategory : saveProduct} className="btn btn-primary">
                  {modal.creating ? '✅ Créer' : '💾 Sauvegarder'}
                </button>
                <button onClick={closeModal} className="btn btn-ghost">Annuler</button>
              </div>
            </div>
          </div>
        )}

      </div>
    );
  }

  const container = document.getElementById('root');
  const root = ReactDOM.createRoot(container);
  root.render(<App />);
</script>

<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}</script>
</body>
</html>
